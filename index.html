<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />

    <title>Workspace</title>
  </head>
  <body>
    <div class="page d-flex">
      <div class="side-bar p-5">
        <div class="side-head p-20 d-flex flex-c">
          <div class="logo mr-10 d-flex flex-c">
            <i class="fa-solid fa-spa t-3xl p-5 rad-10"></i>
          </div>
          <div class="text" style="flex-direction: column">
            <h3 class="m-0 t-base">The Workspace</h3>
            <p class="mt-5 mb-0 t-sm">Productive Mindset</p>
          </div>
        </div>

        <ul class="options">
          <li>
            <a href="">
              <i class="fa-regular fa-circle-check"></i>
              <span>My Tasks</span>
            </a>
          </li>
          <li>
            <a href="">
              <i class="fa-regular fa-folder-open"></i>
              <span>Projects</span></a>
          </li>
          <li>
            <a href="">
              <i class="fa-regular fa-calendar"></i>
              <span>Calender</span></a>
          </li>
          <li>
            <a href="">
              <i class="fa-solid fa-chart-line"></i>
              <span>Analytics</span></a>
          </li>
        </ul>

        <p class="side-bottom">
          <i class="fa-solid fa-circle-plus"></i>
          <span>Quick Add Task</span>
        </p>
      </div>
<!--############################################################ -->
      <div class="container">
        <div class="heading">
          <h1>TO DO LIST</h1>
        </div>

       
      </div>
    </div>
  </body>
</html>
