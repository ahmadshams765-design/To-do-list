<!DOCTYPE html>
<html lang="en">

<head>
    <title>The Workspace</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="sideBar.css">
</head>

<body>

    <div class="side-bar">
        <div class="side-head">
            <div class="logo">
                <i class="fa-solid fa-spa"></i>
            </div>
            <div class="text">
                <h3>The Workspace</h3>
                <p>Productive Mindset</p>
            </div>
        </div>

        <ul class="options">
            <a class="nav-item" href="../First-page/firstpage.html">
                <i class="fa-regular fa-circle-check"></i>
                <span>My Tasks</span>
            </a>

            <a class="nav-item" href="../second-page/second-page.html">
                <i class="fa-regular fa-folder-open"></i>
                <span>Projects</span>
            </a>

            <a class="nav-item" href="../calender/calender.html">
                <i class="fa-regular fa-calendar"></i>
                <span>Calender</span>
            </a>
        </ul>

        <div class="side-bottom">
            <i class="fa-solid fa-circle-plus"></i>
            <span>Create a new project</span>
        </div>
    </div>


    <!-- Create Project Modal -->
    <div class="task-modal-overlay" id="project-modal">
        <div class="task-modal-content project-modal-content">
            <h2>Create New Project</h2>

            <div class="input-group">
                <label>Project Title</label>
                <input type="text" id="proj-title" placeholder="e.g., Oasis Mobile App">
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="proj-desc" placeholder="Briefly describe the project goals..." rows="3"></textarea>
            </div>

            <div class="input-group">
                <label>Add Collaborators</label>
                <div class="collab-search-container">
                    <input type="text" id="collab-search" placeholder="Search by username (e.g. john, sara)">
                    <div id="search-results" class="search-dropdown"></div>
                </div>
                <div id="selected-collabs" class="chips-container">
                    <!-- Chips will appear here -->
                </div>
            </div>

            <div class="modal-actions">
                <button class="cancel-btn" id="close-project-modal">Cancel</button>
                <button class="create-btn" id="confirm-add-project">Create Project</button>
            </div>
        </div>
    </div>

    <script src="./sideBar.js"></script>
    <script src="./projects.js"></script>
</body>

</html>
